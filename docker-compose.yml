version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quizup-postgres
    environment:
      POSTGRES_USER: ${QUIZUP_POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${QUIZUP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${QUIZUP_POSTGRES_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./local-infrastructure/postgres/setup-databases.sql:/docker-entrypoint-initdb.d/setup-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quizup-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: quizup-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${QUIZUP_RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${QUIZUP_RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - quizup-network

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  quizup-network:
    driver: bridge
